<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quazi Reshoan Yazdi | Contact</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    /* eGeneration-inspired palette */
    --eg-green:      #7ab527;
    --eg-blue:       #3d9bd4;
    --eg-orange:     #f5a800;
    --eg-green-dark: #5a8a1a;
    --eg-blue-dark:  #2a72a0;

    /* Light theme */
    --light-bg1: #e8f5d0;
    --light-bg2: #cce8a0;
    --light-card: rgba(255,255,255,0.55);
    --light-card-border: rgba(122,181,39,0.35);
    --light-text: #1e3a05;
    --light-subtext: #3d6b10;
    --light-link: #2a72a0;
    --light-btn-bg: #5a8a1a;
    --light-btn-text: #ffffff;
    --light-glow: rgba(122,181,39,0.35);
    --light-footer: #4a7515;

    /* Dark theme */
    --dark-bg1: #0d1f02;
    --dark-bg2: #0a2a10;
    --dark-card: rgba(15,35,5,0.55);
    --dark-card-border: rgba(122,181,39,0.2);
    --dark-text: #d8f5a0;
    --dark-subtext: #b0d870;
    --dark-link: #7acdff;
    --dark-btn-bg: #7ab527;
    --dark-btn-text: #0d1f02;
    --dark-glow: rgba(122,181,39,0.25);
    --dark-footer: #88c040;

    /* Active tokens */
    --bg1: var(--light-bg1);
    --bg2: var(--light-bg2);
    --card: var(--light-card);
    --card-border: var(--light-card-border);
    --text: var(--light-text);
    --subtext: var(--light-subtext);
    --link: var(--light-link);
    --btn-bg: var(--light-btn-bg);
    --btn-text: var(--light-btn-text);
    --glow: var(--light-glow);
    --footer-color: var(--light-footer);

    --transition: 0.4s ease;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg1: var(--dark-bg1); --bg2: var(--dark-bg2);
      --card: var(--dark-card); --card-border: var(--dark-card-border);
      --text: var(--dark-text); --subtext: var(--dark-subtext);
      --link: var(--dark-link);
      --btn-bg: var(--dark-btn-bg); --btn-text: var(--dark-btn-text);
      --glow: var(--dark-glow); --footer-color: var(--dark-footer);
    }
  }
  html[data-theme="dark"] {
    --bg1: var(--dark-bg1); --bg2: var(--dark-bg2);
    --card: var(--dark-card); --card-border: var(--dark-card-border);
    --text: var(--dark-text); --subtext: var(--dark-subtext);
    --link: var(--dark-link);
    --btn-bg: var(--dark-btn-bg); --btn-text: var(--dark-btn-text);
    --glow: var(--dark-glow); --footer-color: var(--dark-footer);
  }
  html[data-theme="light"] {
    --bg1: var(--light-bg1); --bg2: var(--light-bg2);
    --card: var(--light-card); --card-border: var(--light-card-border);
    --text: var(--light-text); --subtext: var(--light-subtext);
    --link: var(--light-link);
    --btn-bg: var(--light-btn-bg); --btn-text: var(--light-btn-text);
    --glow: var(--light-glow); --footer-color: var(--light-footer);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: linear-gradient(145deg, var(--bg1) 0%, var(--bg2) 100%);
    background-attachment: fixed;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 32px 16px;
    position: relative;
    overflow-x: hidden;
    transition: background var(--transition), color var(--transition);
  }

  /* ── Pixel mosaic background (eGeneration brand motif) ── */
  .pixel-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .pixel-canvas svg {
    width: 100%;
    height: 100%;
  }

  /* ── Circuit trace lines ── */
  .circuit-lines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.12;
  }
  .circuit-lines svg { width: 100%; height: 100%; }

  /* ── Glass card ── */
  .glass-card {
    position: relative;
    z-index: 10;
    background: var(--card);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 44px 32px 36px;
    max-width: 460px;
    width: 100%;
    box-shadow:
      0 0 0 1px var(--card-border),
      0 8px 40px rgba(0,0,0,0.12),
      0 2px 8px rgba(0,0,0,0.06);
    animation: float 7s ease-in-out infinite;
    transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
  }
  .glass-card::before {
    content: '';
    position: absolute;
    inset: -14px;
    background: var(--glow);
    border-radius: 38px;
    z-index: -1;
    filter: blur(24px);
    opacity: 0.6;
    transition: background var(--transition);
  }

  /* Pixel accent strip across top of card */
  .card-pixel-strip {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    border-radius: 24px 24px 0 0;
    background: linear-gradient(90deg,
      var(--eg-green) 0%, var(--eg-green) 30%,
      var(--eg-blue)  30%, var(--eg-blue)  60%,
      var(--eg-orange) 60%, var(--eg-orange) 100%);
  }

  @keyframes float {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-8px); }
  }

  /* ── Container ── */
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    text-align: center;
  }

  /* ── Avatar ── */
  .avatar-wrap {
    position: relative;
    margin-bottom: 14px;
  }
  .avatar-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    background: conic-gradient(
      var(--eg-green) 0deg 120deg,
      var(--eg-blue)  120deg 240deg,
      var(--eg-orange) 240deg 360deg
    );
    animation: spin-ring 8s linear infinite;
    z-index: -1;
  }
  @keyframes spin-ring {
    to { transform: rotate(360deg); }
  }
  img.avatar {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid rgba(255,255,255,0.9);
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    display: block;
    position: relative;
  }

  /* ── Name ── */
  h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.15rem;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-top: 4px;
    margin-bottom: 2px;
    line-height: 1.3;
    transition: color var(--transition);
  }

  /* ── Role badge ── */
  .role-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--eg-green), var(--eg-blue));
    color: #fff;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 12px;
    border-radius: 999px;
    margin: 8px 0 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    box-shadow: 0 2px 8px rgba(61,155,212,0.3);
  }

  /* ── Org info ── */
  .org-block {
    margin-bottom: 10px;
  }
  .org-name {
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--eg-green-dark);
    letter-spacing: 0.02em;
    margin-bottom: 2px;
    transition: color var(--transition);
  }
  html[data-theme="dark"] .org-name,
  @media (prefers-color-scheme: dark) {
    html:not([data-theme]) .org-name { color: var(--eg-green); }
  }
  .dept {
    font-size: 0.73rem;
    color: var(--subtext);
    line-height: 1.5;
    transition: color var(--transition);
  }

  /* ── Divider ── */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--card-border), transparent);
    margin: 12px 0;
    transition: background var(--transition);
  }

  /* ── Contact rows ── */
  .contact-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-bottom: 4px;
  }
  .contact-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.8rem;
    color: var(--subtext);
    transition: color var(--transition);
  }
  .contact-row .icon-dot {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    background: rgba(122,181,39,0.12);
    transition: background var(--transition);
  }
  .contact-row a {
    color: var(--link);
    text-decoration: none;
    transition: color var(--transition);
  }
  .contact-row a:hover {
    text-decoration: underline;
  }

  /* WhatsApp badge */
  .wa-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(37,211,102,0.15);
    color: #1da851;
    font-size: 0.62rem;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 999px;
    margin-left: 5px;
    letter-spacing: 0.04em;
    vertical-align: middle;
  }

  /* ── Save button ── */
  .save-btn {
    margin-top: 18px;
    width: 100%;
    background: linear-gradient(135deg, var(--eg-green) 0%, var(--eg-blue) 100%);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    cursor: pointer;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 18px rgba(122,181,39,0.35);
    transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .save-btn:hover {
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 8px 28px rgba(61,155,212,0.4);
  }
  .save-btn:active {
    transform: scale(0.98);
  }

  /* ── Footer ── */
  footer {
    margin-top: 14px;
    font-size: 0.65rem;
    color: var(--footer-color);
    opacity: 0.75;
    letter-spacing: 0.04em;
    text-align: center;
    width: 100%;
    transition: color var(--transition);
  }

  /* ── Theme toggle ── */
  .theme-toggle {
    position: absolute;
    top: 14px;
    right: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 46px;
    height: 26px;
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    cursor: pointer;
    border: 1px solid rgba(122,181,39,0.25);
    transition: background var(--transition), border-color var(--transition), transform 0.15s;
    backdrop-filter: blur(6px);
    z-index: 20;
  }
  .theme-toggle:active { transform: scale(0.96); }

  .toggle-knob {
    position: absolute;
    top: 3px;
    left: calc(100% - 5px - 20px);
    width: 20px;
    height: 20px;
    background: linear-gradient(180deg, #fff, #e0e0e0);
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: left 0.28s cubic-bezier(.2,.9,.2,1), background var(--transition);
  }
  html[data-theme="dark"] .toggle-knob {
    left: 5px;
    background: linear-gradient(180deg, #1a3a0a, #0d2005);
  }
  html[data-theme="light"] .toggle-knob {
    left: calc(100% - 5px - 20px);
    background: linear-gradient(180deg,#fff,#e0e0e0);
  }
  html[data-theme="dark"] .theme-toggle {
    background: rgba(0,0,0,0.3);
    border-color: rgba(122,181,39,0.15);
  }
  @media (prefers-color-scheme: dark) {
    html:not([data-theme]) .toggle-knob {
      left: 5px;
      background: linear-gradient(180deg,#1a3a0a,#0d2005);
    }
    html:not([data-theme]) .theme-toggle {
      background: rgba(0,0,0,0.3);
    }
  }
  .toggle-icon { width: 12px; height: 12px; pointer-events: none; }
  .icon-moon { display: none; }
  .icon-sun  { display: block; }
  html[data-theme="dark"] .icon-moon { display: block; }
  html[data-theme="dark"] .icon-sun  { display: none; }
  html[data-theme="light"] .icon-moon { display: none; }
  html[data-theme="light"] .icon-sun  { display: block; }
  @media (prefers-color-scheme: dark) {
    html:not([data-theme]) .icon-moon { display: block; }
    html:not([data-theme]) .icon-sun  { display: none; }
  }
</style>
</head>

<script>
/* ── Pixel mosaic background ── */
(function() {
  const canvas = document.getElementById('pixelCanvas');
  const colors = ['#7ab527','#3d9bd4','#f5a800','#5a8a1a','#2a72a0'];
  const sizes  = [8, 12, 16, 20];
  const count  = 55;
  const svgNS  = 'http://www.w3.org/2000/svg';
  const svg    = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('width','100%');
  svg.setAttribute('height','100%');
  svg.style.position = 'absolute';
  svg.style.inset = '0';
  for (let i = 0; i < count; i++) {
    const r   = document.createElementNS(svgNS,'rect');
    const s   = sizes[Math.floor(Math.random()*sizes.length)];
    const col = colors[Math.floor(Math.random()*colors.length)];
    const x   = Math.random()*100;
    const y   = Math.random()*100;
    r.setAttribute('x', x+'%');
    r.setAttribute('y', y+'%');
    r.setAttribute('width', s);
    r.setAttribute('height', s);
    r.setAttribute('rx', 2);
    r.setAttribute('fill', col);
    r.setAttribute('opacity', (0.07 + Math.random()*0.1).toFixed(2));
    svg.appendChild(r);
  }
  canvas.appendChild(svg);
})();

/* ── VCF download ── */
function downloadVCF() {
  const vcardData = `BEGIN:VCARD
VERSION:3.0
N:Yazdi;Quazi Reshoan;;;
FN:Quazi Reshoan Yazdi
TITLE:Junior DevOps Engineer
ORG:eGeneration PLC;Business Delivery & Development Department
ADR;TYPE=WORK:;;Dhaka;;; ;Bangladesh
TEL;TYPE=CELL,VOICE:+8801722388407
TEL;TYPE=CELL,X-WA:+8801722388407
EMAIL;TYPE=WORK:quazi.reshoan@egeneration.co
URL:https://www.linkedin.com/in/quazi-reshoan-yazdi-dhaka1207
END:VCARD`;
  const encoded  = encodeURIComponent(vcardData);
  const link     = document.createElement('a');
  link.href      = 'data:text/vcard;charset=utf-8,' + encoded;
  link.download  = 'Quazi_Reshoan_Yazdi_eGeneration.vcf';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

/* ── Theme toggle ── */
(function(){
  const root   = document.documentElement;
  const toggle = document.getElementById('themeToggle');
  const knob   = document.getElementById('toggleKnob');

  function isDark() {
    return root.getAttribute('data-theme') === 'dark' ||
           (!root.hasAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
  }
  function apply(theme) {
    if (theme === 'dark')  { root.setAttribute('data-theme','dark');  toggle.setAttribute('aria-pressed','true'); }
    else if (theme === 'light') { root.setAttribute('data-theme','light'); toggle.setAttribute('aria-pressed','false'); }
    else { root.removeAttribute('data-theme'); toggle.setAttribute('aria-pressed', String(isDark())); }
    syncIcons();
  }
  function syncIcons() {
    const dark = isDark();
    const sun  = knob.querySelector('.icon-sun');
    const moon = knob.querySelector('.icon-moon');
    if (sun)  sun.style.display  = dark ? 'none'  : 'block';
    if (moon) moon.style.display = dark ? 'block' : 'none';
  }
  apply(null);
  toggle.addEventListener('click', function(){
    const cur = root.getAttribute('data-theme');
    if      (cur === 'dark')  apply('light');
    else if (cur === 'light') apply('dark');
    else apply(isDark() ? 'light' : 'dark');
  });
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => apply(null));
  }
})();
</script>
</body>
</html>
